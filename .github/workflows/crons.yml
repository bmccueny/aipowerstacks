name: Cron Jobs

on:
  schedule:
    - cron: '0 6 * * *'     # 06:00 UTC daily
    - cron: '0 7 * * *'     # 07:00 UTC daily
    - cron: '0 2 * * *'     # 02:00 UTC daily
    - cron: '0 10 * * *'    # 10:00 UTC daily
    - cron: '0 9 * * *'     # 09:00 UTC daily
    - cron: '0 9 * * 1'     # 09:00 UTC Monday
    - cron: '0 8 * * *'     # 08:00 UTC daily
    - cron: '0 20 * * *'    # 20:00 UTC daily
    - cron: '0 23 * * *'    # 23:00 UTC daily
    - cron: '0 5 * * *'     # 05:00 UTC daily
    - cron: '0 4 * * *'     # 04:00 UTC daily
    - cron: '15 3 * * *'    # 03:15 UTC daily
    - cron: '0 9 1 * *'     # 09:00 UTC 1st of month
  workflow_dispatch:
    inputs:
      job:
        description: 'Which cron job to run (or "all")'
        required: false
        default: 'all'

env:
  CRON_SECRET: ${{ secrets.CRON_SECRET }}
  SITE_URL: https://www.aipowerstacks.com

jobs:
  featured-stack:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 6 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Call Featured Stack Cron
        run: |
          status=$(curl -s -o /tmp/response.txt -w "%{http_code}" -H "Authorization: Bearer $CRON_SECRET" "$SITE_URL/api/cron/featured-stack")
          echo "HTTP $status"
          cat /tmp/response.txt
          [ "$status" -ge 200 ] && [ "$status" -lt 300 ]

  blog-posts:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 7 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Call Blog Posts Cron
        run: |
          status=$(curl -s -o /tmp/response.txt -w "%{http_code}" -H "Authorization: Bearer $CRON_SECRET" "$SITE_URL/api/cron/blog-posts")
