    font-size="20"
    fill="white"
    fill-opacity="0.5"
    text-anchor="middle">AI Tools</text>

  <!-- Divider lines -->
  <rect x="393" y="990" width="1" height="140" fill="white" fill-opacity="0.08"/>
  <rect x="687" y="990" width="1" height="140" fill="white" fill-opacity="0.08"/>

  <!-- Stat 2 -->
  <text x="540" y="1040"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="64"
    font-weight="800"
    fill="#d4402b"
    text-anchor="middle">44+</text>
  <text x="540" y="1080"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="20"
    fill="white"
    fill-opacity="0.5"
