    letter-spacing="1.5">aipowerstacks.com</text>

  <!-- Bottom decorative bar repeat motif -->
  <rect x="340" y="1650" width="400" height="8" rx="4" fill="#d4402b" fill-opacity="0.25"/>
  <rect x="390" y="672" width="300" height="8" rx="4" fill="#d4402b" fill-opacity="0.18"/>
  <rect x="440" y="694" width="200" height="8" rx="4" fill="#d4402b" fill-opacity="0.12"/>
</svg>
