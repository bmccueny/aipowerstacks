  <rect x="80" y="280" width="200" height="14" rx="7" fill="#d4402b" fill-opacity="0.06"/>
  <rect x="80" y="306" width="144" height="14" rx="7" fill="#d4402b" fill-opacity="0.04"/>
  <rect x="80" y="332" width="88" height="14" rx="7" fill="#d4402b" fill-opacity="0.03"/>

  <rect x="780" y="280" width="200" height="14" rx="7" fill="#d4402b" fill-opacity="0.06"/>
  <rect x="780" y="306" width="144" height="14" rx="7" fill="#d4402b" fill-opacity="0.04"/>
  <rect x="780" y="332" width="88" height="14" rx="7" fill="#d4402b" fill-opacity="0.03"/>

  <!-- Row 2 -->
  <rect x="80" y="1280" width="180" height="12" rx="6" fill="#d4402b" fill-opacity="0.05"/>
  <rect x="80" y="1304" width="130" height="12" rx="6" fill="#d4402b" fill-opacity="0.04"/>
  <rect x="80" y="1328" width="80" height="12" rx="6" fill="#d4402b" fill-opacity="0.03"/>

  <rect x="820" y="1280" width="180" height="12" rx="6" fill="#d4402b" fill-opacity="0.05"/>
  <rect x="820" y="1304" width="130" height="12" rx="6" fill="#d4402b" fill-opacity="0.04"/>
  <rect x="820" y="1328" width="80" height="12" rx="6" fill="#d4402b" fill-opacity="0.03"/>

  <!-- Row 3 -->
