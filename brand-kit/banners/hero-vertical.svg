<svg viewBox="0 0 1080 1920" width="1080" height="1920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1080" y2="1920" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1f1a16"/>
      <stop offset="50%" stop-color="#161210"/>
      <stop offset="100%" stop-color="#0b0907"/>
    </linearGradient>
    <radialGradient id="glow-top" cx="50%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#d4402b" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#d4402b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-bot" cx="50%" cy="85%" r="40%">
      <stop offset="0%" stop-color="#d4402b" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d4402b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <rect width="1080" height="1920" fill="url(#glow-top)"/>
  <rect width="1080" height="1920" fill="url(#glow-bot)"/>

  <!-- Subtle stacked bars pattern — tiled throughout background -->
