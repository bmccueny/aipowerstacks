  <rect x="400" y="502" width="200" height="10" rx="5" fill="#d4402b" fill-opacity="0.03"/>
  <rect x="400" y="524" width="120" height="10" rx="5" fill="#d4402b" fill-opacity="0.02"/>

  <!-- Top section: Logo -->
  <!-- Icon large -->
  <rect x="390" y="180" width="300" height="300" rx="66" fill="#d4402b"/>
  <rect x="450" y="248" width="180" height="36" rx="18" fill="#1a1512"/>
  <rect x="450" y="299" width="130" height="36" rx="18" fill="#1a1512"/>
  <rect x="450" y="350" width="80" height="36" rx="18" fill="#1a1512"/>

  <!-- Wordmark below icon -->
