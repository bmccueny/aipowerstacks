    font-size="64"
    fill="white"
    letter-spacing="-2"
    text-anchor="middle">
    <tspan font-weight="800">AI</tspan><tspan font-weight="400">PowerStacks</tspan>
  </text>

  <!-- Divider -->
  <rect x="240" y="610" width="600" height="1" fill="white" fill-opacity="0.10"/>

