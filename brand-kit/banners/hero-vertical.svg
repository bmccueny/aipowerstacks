  <!-- Stat 3 -->
  <text x="850" y="1032"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="40"
    font-weight="800"
    fill="#d4402b"
    text-anchor="middle">Updated</text>
  <text x="850" y="1080"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="40"
    font-weight="800"
    fill="#d4402b"
