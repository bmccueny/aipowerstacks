<svg viewBox="0 0 1200 800" width="1200" height="800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1512"/>
      <stop offset="100%" stop-color="#0e0c0a"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse" x1="200" y1="180" x2="200" y2="360">
      <stop offset="0%" stop-color="#2e2823"/>
      <stop offset="100%" stop-color="#241f1b"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse" x1="500" y1="240" x2="500" y2="420">
      <stop offset="0%" stop-color="#2e2823"/>
      <stop offset="100%" stop-color="#241f1b"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse" x1="800" y1="200" x2="800" y2="380">
      <stop offset="0%" stop-color="#2e2823"/>
      <stop offset="100%" stop-color="#241f1b"/>
    </linearGradient>
    <linearGradient id="primary-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4402b"/>
      <stop offset="100%" stop-color="#e85d47"/>
    </linearGradient>
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#d4402b" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="600" cy="400" rx="500" ry="350" fill="#d4402b" fill-opacity="0.05"/>

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="200" x2="1200" y2="200" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="400" x2="1200" y2="400" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="600" x2="1200" y2="600" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="800" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="800" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="900" y1="0" x2="900" y2="800" stroke="white" stroke-opacity="0.03" stroke-width="1"/>

  <!-- ===== FLOATING TOOL CARDS ===== -->

  <!-- Card 1 (left, slightly tilted back) -->
  <g transform="translate(80, 170) rotate(-6, 175, 175)" filter="url(#card-shadow)">
    <rect width="350" height="220" rx="16" fill="#2a2320" stroke="#d4402b" stroke-opacity="0.15" stroke-width="1"/>
    <!-- Card header bar -->
    <rect x="0" y="0" width="350" height="8" rx="4" fill="#d4402b" fill-opacity="0.6"/>
    <!-- Tool icon placeholder -->
    <rect x="20" y="30" width="44" height="44" rx="10" fill="#d4402b" fill-opacity="0.2"/>
    <rect x="30" y="44" width="24" height="4" rx="2" fill="#d4402b"/>
    <rect x="30" y="54" width="17" height="4" rx="2" fill="#d4402b" fill-opacity="0.6"/>
    <!-- Tool name -->
    <rect x="76" y="38" width="120" height="12" rx="4" fill="white" fill-opacity="0.7"/>
    <rect x="76" y="58" width="80" height="8" rx="3" fill="white" fill-opacity="0.3"/>
    <!-- Price badge -->
    <rect x="268" y="38" width="62" height="28" rx="14" fill="#d4402b" fill-opacity="0.15" stroke="#d4402b" stroke-opacity="0.4" stroke-width="1"/>
    <rect x="278" y="47" width="42" height="10" rx="3" fill="#d4402b" fill-opacity="0.8"/>
    <!-- Bar stack -->
    <rect x="20" y="110" width="280" height="8" rx="4" fill="white" fill-opacity="0.08"/>
    <rect x="20" y="126" width="200" height="8" rx="4" fill="white" fill-opacity="0.06"/>
    <rect x="20" y="142" width="120" height="8" rx="4" fill="white" fill-opacity="0.04"/>
    <!-- Tags -->
    <rect x="20" y="168" width="70" height="22" rx="11" fill="#d4402b" fill-opacity="0.12"/>
    <rect x="100" y="168" width="60" height="22" rx="11" fill="white" fill-opacity="0.06"/>
    <rect x="170" y="168" width="80" height="22" rx="11" fill="white" fill-opacity="0.06"/>
  </g>

  <!-- Card 2 (center, front/highlighted) -->
  <g transform="translate(390, 200)" filter="url(#card-shadow)">
    <rect width="360" height="240" rx="16" fill="#302820" stroke="#d4402b" stroke-opacity="0.40" stroke-width="1.5"/>
    <!-- Bright header bar -->
    <rect x="0" y="0" width="360" height="8" rx="4" fill="url(#primary-grad)"/>
    <!-- Tool icon -->
    <rect x="20" y="30" width="52" height="52" rx="12" fill="#d4402b"/>
    <rect x="33" y="42" width="26" height="5" rx="2.5" fill="#1a1512"/>
    <rect x="33" y="52" width="19" height="5" rx="2.5" fill="#1a1512"/>
    <rect x="33" y="62" width="11" height="5" rx="2.5" fill="#1a1512"/>
    <!-- Tool name + tagline -->
    <rect x="84" y="36" width="140" height="14" rx="4" fill="white" fill-opacity="0.85"/>
    <rect x="84" y="58" width="96" height="9" rx="3" fill="white" fill-opacity="0.35"/>
    <!-- Cost highlight -->
    <rect x="270" y="32" width="70" height="34" rx="10" fill="#d4402b"/>
    <rect x="279" y="41" width="52" height="14" rx="3" fill="white" fill-opacity="0.85"/>
    <!-- Bar chart  -->
    <rect x="20" y="114" width="320" height="10" rx="5" fill="#d4402b" fill-opacity="0.25"/>
    <rect x="20" y="132" width="230" height="10" rx="5" fill="#d4402b" fill-opacity="0.18"/>
    <rect x="20" y="150" width="140" height="10" rx="5" fill="#d4402b" fill-opacity="0.12"/>
    <!-- Tags -->
    <rect x="20" y="178" width="88" height="26" rx="13" fill="#d4402b" fill-opacity="0.18" stroke="#d4402b" stroke-opacity="0.4" stroke-width="1"/>
    <rect x="116" y="178" width="72" height="26" rx="13" fill="white" fill-opacity="0.07"/>
    <rect x="196" y="178" width="94" height="26" rx="13" fill="white" fill-opacity="0.07"/>
  </g>

  <!-- Card 3 (right, tilted) -->
  <g transform="translate(790, 185) rotate(5, 175, 175)" filter="url(#card-shadow)">
    <rect width="340" height="210" rx="16" fill="#2a2320" stroke="#d4402b" stroke-opacity="0.15" stroke-width="1"/>
    <rect x="0" y="0" width="340" height="8" rx="4" fill="#d4402b" fill-opacity="0.5"/>
    <rect x="20" y="30" width="42" height="42" rx="9" fill="#d4402b" fill-opacity="0.15"/>
    <rect x="29" y="42" width="24" height="4" rx="2" fill="#d4402b" fill-opacity="0.7"/>
    <rect x="29" y="52" width="17" height="4" rx="2" fill="#d4402b" fill-opacity="0.5"/>
    <rect x="74" y="36" width="110" height="12" rx="4" fill="white" fill-opacity="0.65"/>
    <rect x="74" y="56" width="75" height="8" rx="3" fill="white" fill-opacity="0.28"/>
    <rect x="260" y="36" width="60" height="26" rx="13" fill="#d4402b" fill-opacity="0.13" stroke="#d4402b" stroke-opacity="0.35" stroke-width="1"/>
    <rect x="269" y="44" width="42" height="10" rx="3" fill="#d4402b" fill-opacity="0.75"/>
    <rect x="20" y="106" width="270" height="7" rx="3.5" fill="white" fill-opacity="0.07"/>
    <rect x="20" y="121" width="194" height="7" rx="3.5" fill="white" fill-opacity="0.05"/>
    <rect x="20" y="136" width="118" height="7" rx="3.5" fill="white" fill-opacity="0.04"/>
    <rect x="20" y="162" width="65" height="21" rx="10.5" fill="#d4402b" fill-opacity="0.10"/>
    <rect x="94" y="162" width="57" height="21" rx="10.5" fill="white" fill-opacity="0.05"/>
  </g>

  <!-- Overlap warning badge (between cards 1 and 2) -->
  <g transform="translate(340, 340)" filter="url(#glow-red)">
    <rect width="90" height="36" rx="18" fill="#d4402b"/>
    <text x="45" y="23"
      font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
      font-size="13"
      font-weight="700"
      fill="white"
      text-anchor="middle">OVERLAP</text>
  </g>

  <!-- Connection lines between cards -->
  <line x1="378" y1="300" x2="420" y2="320" stroke="#d4402b" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="710" y1="320" x2="760" y2="305" stroke="#d4402b" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Bottom large bar motif -->
  <rect x="160" y="560" width="880" height="18" rx="9" fill="#d4402b" fill-opacity="0.10"/>
  <rect x="200" y="592" width="640" height="18" rx="9" fill="#d4402b" fill-opacity="0.07"/>
  <rect x="240" y="624" width="400" height="18" rx="9" fill="#d4402b" fill-opacity="0.05"/>
  <rect x="280" y="656" width="200" height="18" rx="9" fill="#d4402b" fill-opacity="0.03"/>

  <!-- Brand label at bottom -->
  <text x="600" y="740"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="18"
    fill="white"
    fill-opacity="0.20"
    text-anchor="middle"
    letter-spacing="4">AI POWER STACKS — STOP OVERPAYING</text>
</svg>
