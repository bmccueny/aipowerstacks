<svg viewBox="0 0 1080 1080" width="1080" height="1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1f1a16"/>
      <stop offset="100%" stop-color="#0b0907"/>
    </linearGradient>
    <linearGradient id="red-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4402b" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#d4402b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="card-grad" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse" x1="0" y1="580" x2="0" y2="780">
      <stop offset="0%" stop-color="#2a2320"/>
      <stop offset="100%" stop-color="#221e1b"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <!-- Glow -->
  <ellipse cx="200" cy="200" rx="500" ry="400" fill="url(#red-glow)"/>
  <ellipse cx="900" cy="900" rx="400" ry="300" fill="#d4402b" fill-opacity="0.07"/>

  <!-- Decorative bars pattern (subtle background) -->
  <rect x="740" y="120" width="220" height="18" rx="9" fill="#d4402b" fill-opacity="0.08"/>
  <rect x="740" y="152" width="158" height="18" rx="9" fill="#d4402b" fill-opacity="0.06"/>
  <rect x="740" y="184" width="97" height="18" rx="9" fill="#d4402b" fill-opacity="0.04"/>

  <rect x="60" y="820" width="220" height="14" rx="7" fill="#d4402b" fill-opacity="0.08"/>
  <rect x="60" y="848" width="158" height="14" rx="7" fill="#d4402b" fill-opacity="0.06"/>
  <rect x="60" y="876" width="97" height="14" rx="7" fill="#d4402b" fill-opacity="0.04"/>

  <!-- Logo at top -->
  <rect x="60" y="80" width="130" height="130" rx="29" fill="#d4402b"/>
  <rect x="87" y="113" width="76" height="15" rx="7.5" fill="#1a1512"/>
  <rect x="87" y="135" width="55" height="15" rx="7.5" fill="#1a1512"/>
  <rect x="87" y="157" width="34" height="15" rx="7.5" fill="#1a1512"/>

  <text x="210" y="148"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="52"
    fill="white"
    letter-spacing="-1">
    <tspan font-weight="800">AI</tspan><tspan font-weight="400">PowerStacks</tspan>
  </text>

  <!-- Main headline area -->
  <text x="60" y="360"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="72"
    font-weight="800"
    fill="white"
    letter-spacing="-2">Stop Wasting</text>
  <text x="60" y="450"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="72"
    font-weight="800"
    fill="#d4402b"
    letter-spacing="-2">Money on AI.</text>

  <text x="60" y="530"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="28"
    font-weight="400"
    fill="white"
    fill-opacity="0.65"
    letter-spacing="0">Track, compare &amp; cut overlapping AI subscriptions.</text>

  <!-- Stat cards -->
  <!-- Card 1 -->
  <rect x="60" y="600" width="290" height="150" rx="16" fill="#2a2320" stroke="#d4402b" stroke-opacity="0.3" stroke-width="1"/>
  <text x="105" y="668"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="52"
    font-weight="800"
    fill="#d4402b">422+</text>
  <text x="105" y="700"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="18"
    fill="white"
    fill-opacity="0.55">AI Tools Tracked</text>

  <!-- Card 2 -->
  <rect x="390" y="600" width="290" height="150" rx="16" fill="#2a2320" stroke="#d4402b" stroke-opacity="0.3" stroke-width="1"/>
  <text x="435" y="668"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="52"
    font-weight="800"
    fill="#d4402b">44+</text>
  <text x="435" y="700"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="18"
    fill="white"
    fill-opacity="0.55">Categories</text>

  <!-- Card 3 -->
  <rect x="720" y="600" width="300" height="150" rx="16" fill="#2a2320" stroke="#d4402b" stroke-opacity="0.3" stroke-width="1"/>
  <text x="765" y="660"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="34"
    font-weight="800"
    fill="#d4402b">Daily</text>
  <text x="765" y="700"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="18"
    fill="white"
    fill-opacity="0.55">Updates</text>

  <!-- CTA Button -->
  <rect x="60" y="810" width="400" height="72" rx="36" fill="#d4402b"/>
  <text x="260" y="855"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="26"
    font-weight="700"
    fill="white"
    text-anchor="middle">Start Tracking Free →</text>

  <!-- URL -->
  <text x="60" y="970"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="22"
    fill="white"
    fill-opacity="0.3"
    letter-spacing="1">aipowerstacks.com</text>
</svg>
