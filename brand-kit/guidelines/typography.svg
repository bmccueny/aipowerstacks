<svg viewBox="0 0 1200 960" width="1200" height="960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="960" fill="#fafaf8"/>

  <!-- Header -->
  <rect x="0" y="0" width="1200" height="80" fill="#1a1512"/>
  <text x="48" y="50"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="28" font-weight="700" fill="white" letter-spacing="-0.5">AIPowerStacks — Typography System</text>
  <text x="1152" y="50"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="14" fill="white" fill-opacity="0.45" text-anchor="end">Geist Sans · Inter</text>

  <!-- Left column: Geist Sans scale -->
  <text x="48" y="124"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="11" font-weight="600" fill="#1a1512" fill-opacity="0.4" letter-spacing="1.5">GEIST SANS — PRIMARY FONT</text>
  <rect x="48" y="130" width="500" height="1" fill="#d4402b" fill-opacity="0.3"/>

  <!-- H1 -->
  <text x="48" y="188"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="48" font-weight="800" fill="#1a1512" letter-spacing="-1.5">Track. Compare. Save.</text>
  <text x="620" y="188"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="11" fill="#1a1512" fill-opacity="0.4">H1 · 48px · 800 weight</text>

  <!-- H2 -->
  <text x="48" y="250"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="36" font-weight="700" fill="#1a1512" letter-spacing="-1">Stop Overpaying for AI Tools</text>
  <text x="620" y="250"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="11" fill="#1a1512" fill-opacity="0.4">H2 · 36px · 700 weight</text>

  <!-- H3 -->
  <text x="48" y="306"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="28" font-weight="600" fill="#1a1512" letter-spacing="-0.5">Discover 422+ AI Tools</text>
  <text x="620" y="306"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="11" fill="#1a1512" fill-opacity="0.4">H3 · 28px · 600 weight</text>

  <!-- H4 -->
  <text x="48" y="354"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="22" font-weight="600" fill="#1a1512" letter-spacing="-0.3">Find Overlap in Your Subscriptions</text>
  <text x="620" y="354"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="11" fill="#1a1512" fill-opacity="0.4">H4 · 22px · 600 weight</text>

  <!-- H5 -->
  <text x="48" y="396"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="17" font-weight="600" fill="#1a1512">AI Tool Categories — Updated Daily</text>
  <text x="620" y="396"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="11" fill="#1a1512" fill-opacity="0.4">H5 · 17px · 600 weight</text>

  <!-- H6 -->
  <text x="48" y="432"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="14" font-weight="600" fill="#1a1512" letter-spacing="0.2">Subscription Management for Power Users</text>
  <text x="620" y="432"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="11" fill="#1a1512" fill-opacity="0.4">H6 · 14px · 600 weight</text>

  <rect x="48" y="452" width="1104" height="1" fill="#1a1512" fill-opacity="0.06"/>

  <!-- Body text -->
  <text x="48" y="485"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="11" font-weight="600" fill="#1a1512" fill-opacity="0.4" letter-spacing="1.5">BODY TEXT</text>

  <text x="48" y="520"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="16" fill="#1a1512" fill-opacity="0.85">AIPowerStacks helps you discover, compare, and track AI tool subscriptions so you</text>
  <text x="48" y="542"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="16" fill="#1a1512" fill-opacity="0.85">can find overlap and cut waste. Browse 422+ tools across 44+ categories.</text>
  <text x="1152" y="526"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="11" fill="#1a1512" fill-opacity="0.4" text-anchor="end">Body · 16px · 400</text>

  <text x="48" y="582"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="14" fill="#1a1512" fill-opacity="0.70">Secondary body text for supporting copy and descriptions. Slightly muted for hierarchy.</text>
  <text x="1152" y="582"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="11" fill="#1a1512" fill-opacity="0.4" text-anchor="end">Body SM · 14px · 400</text>

  <text x="48" y="618"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="12" fill="#1a1512" fill-opacity="0.50">Caption and label text — used for metadata, dates, badges, and fine print information.</text>
  <text x="1152" y="618"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="11" fill="#1a1512" fill-opacity="0.4" text-anchor="end">Caption · 12px · 400</text>

  <rect x="48" y="640" width="1104" height="1" fill="#1a1512" fill-opacity="0.06"/>

  <!-- Right column: Special styles -->
  <text x="48" y="670"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="11" font-weight="600" fill="#1a1512" fill-opacity="0.4" letter-spacing="1.5">SPECIAL STYLES</text>

  <!-- Brand wordmark example -->
  <text x="48" y="720"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="48" fill="#d4402b" letter-spacing="-1">
    <tspan font-weight="800">AI</tspan><tspan font-weight="400">PowerStacks</tspan>
  </text>
  <text x="620" y="720"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="11" fill="#1a1512" fill-opacity="0.4">Brand Wordmark: "AI" 800w · "PowerStacks" 400w · Primary Red</text>

  <!-- CTA style -->
  <rect x="48" y="750" width="280" height="52" rx="26" fill="#d4402b"/>
  <text x="188" y="782"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="18" font-weight="700" fill="white" text-anchor="middle">Start Tracking Free</text>
  <text x="620" y="782"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="11" fill="#1a1512" fill-opacity="0.4">CTA Button · 18px · 700 weight · white on primary</text>

  <!-- Label/badge -->
  <rect x="48" y="826" width="100" height="28" rx="14" fill="#d4402b" fill-opacity="0.12"/>
  <text x="98" y="845"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="13" font-weight="600" fill="#d4402b" text-anchor="middle">New Tool</text>
  <rect x="164" y="826" width="80" height="28" rx="14" fill="#1a1512" fill-opacity="0.07"/>
  <text x="204" y="845"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="13" font-weight="600" fill="#1a1512" fill-opacity="0.6" text-anchor="middle">$29/mo</text>
  <text x="620" y="845"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="11" fill="#1a1512" fill-opacity="0.4">Badges/Labels · 13px · 600 weight</text>

  <!-- Footer -->
  <text x="48" y="930"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="11" fill="#1a1512" fill-opacity="0.3">AIPowerStacks Brand System · March 2026 · Primary: Geist Sans · Display: Inter</text>
</svg>
